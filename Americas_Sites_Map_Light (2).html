  .header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-mark {
    width: 38px;
    height: 38px;
    background: #c8102e;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: -1px;
    color: white;
    clip-path: polygon(0 0, 85% 0, 100% 50%, 85% 100%, 0 100%);
  }

  h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #1a2033;
  }

  h1 span { color: #c8102e; }

  .site-count {
    font-size: 12px;
    color: #6b7a99;
    font-weight: 400;
    letter-spacing: 0.5px;
  }

  .legend {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: #3a4a66;
  }

  .legend-dot {
    width: 11px;
    height: 11px;
    border-radius: 50%;
    border: 2px solid rgba(0,0,0,0.15);
  }

  #map {
    flex: 1;
    width: 100%;
  }

  .search-bar {
    position: absolute;
    top: 78px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 800;
    width: 380px;
  }

  .search-bar input {
    width: 100%;
    background: #ffffff;
    border: 1.5px solid #d0d7e8;
    border-radius: 6px;
    color: #1a2033;
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    padding: 10px 16px;
    outline: none;
    box-shadow: 0 2px 8px rgba(0,0,0,0.10);
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .search-bar input:focus {
    border-color: #c8102e;
    box-shadow: 0 2px 12px rgba(200,16,46,0.15);
  }

  .search-bar input::placeholder { color: #a0aabb; }

    background: #ffffff !important;
    border: 1.5px solid #dde3ef !important;
    border-radius: 6px !important;
    box-shadow: 0 6px 24px rgba(0,0,0,0.13) !important;
    color: #1a2033 !important;

  .popup-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: #1a2033;

    font-size: 11px;
    color: #6b7a99;

    margin-bottom: 6px;
  }

    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;

    background: #ffffff;

    border-radius: 6px;
    padding: 14px 18px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.10);

  }

    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #8892aa;
    margin-bottom: 10px;
    border-bottom: 1px solid #eef0f5;
    padding-bottom: 8px;
  }

    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;

    font-size: 11px;
    font-weight: 500;
    color: #3a4a66;

    align-items: center;

    color: #a0aabb !important;
    font-size: 9px !important;
  }

// Map init - light tile layer
const map = L.map('map', { center: [20, -85], zoom: 4 });

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 20
}).addTo(map);

function makeIcon(country) {
  const color = COLORS[country] || '#1a2033';
  return L.divIcon({
    className: '',
    html: `<div style="
      width:13px;height:13px;
      border-radius:50%;
      background:${color};
      border:2.5px solid rgba(255,255,255,0.9);
      box-shadow:0 1px 4px rgba(0,0,0,0.3);
      cursor:pointer;
    "></div>`,
    iconSize: [13,13],
    iconAnchor: [6,6]
  });
}

function getPopupHtml(site) {
  const color = COLORS[site.country] || '#1a2033';
  return `
    <div class="popup-name">${site.name}</div>
    <div class="popup-address">${site.address}</div>
    <span class="popup-country" style="background:${color}18;color:${color};border:1px solid ${color}55">${site.country}</span>
  `;
}

let markers = [];

sites.forEach(site => {
  const marker = L.marker([site.lat, site.lng], { icon: makeIcon(site.country) });
  marker.bindPopup(getPopupHtml(site), { maxWidth: 260 });
  marker.siteData = site;
  marker.addTo(map);
  markers.push(marker);
});

document.getElementById('siteCountLabel').textContent = `${sites.length} sites across 9 countries`;

// Country stats
const countryCount = {};
sites.forEach(s => { countryCount[s.country] = (countryCount[s.country] || 0) + 1; });
const statsEl = document.getElementById('countryStats');
Object.entries(countryCount).sort((a,b) => b[1]-a[1]).forEach(([country, count]) => {
  statsEl.innerHTML += `
    <div class="stat-row">
      <div class="stat-label">
        <div class="stat-swatch" style="background:${COLORS[country]}"></div>
        ${country}
      </div>
      <div class="stat-num">${count}</div>
    </div>`;
});

// Search
document.getElementById('searchInput').addEventListener('input', function() {
  const query = this.value.toLowerCase().trim();
  markers.forEach(marker => {
    const s = marker.siteData;
    const matches = !query ||
      s.name.toLowerCase().includes(query) ||
      s.address.toLowerCase().includes(query) ||
      s.country.toLowerCase().includes(query);
    marker._icon && (marker._icon.style.opacity = matches ? '1' : '0.12');
  });
});
</script>
